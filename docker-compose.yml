version: '3.8'

services:
  bot:
    image: ghcr.io/barbashov/telegram_summarize_bot:main
    pull_policy: always
    container_name: telegram_summarize_bot
    restart: unless-stopped
    volumes:
      - bot_data:/app/data
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/bot.db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot_data:
    driver: local
